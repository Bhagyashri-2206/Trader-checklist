<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trader Checklist</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

/* Background */
body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#000000);
background-size:400% 400%;
animation:gradientMove 15s ease infinite;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Card */
.container{
width:500px;
padding:30px;
border-radius:20px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
box-shadow:0 0 40px rgba(0,0,0,0.6);
color:white;
}

h1{text-align:center;margin-bottom:10px;}

.motivation{
text-align:center;
font-size:15px;
color:#00ffcc;
margin-bottom:20px;
}

/* List */
ul{
list-style:none;
}

li{
margin:8px 0;
padding:10px;
border-radius:10px;
display:flex;
align-items:center;
transition:0.3s;
position:relative;
}

li:hover{
background:rgba(255,255,255,0.1);
}

input[type="checkbox"]{
margin-right:10px;
cursor:pointer;
}

.checked{
text-decoration:line-through;
color:#00ffcc;
}

/* Buttons */
.buttons{
text-align:center;
margin-top:20px;
}

button{
padding:8px 15px;
margin:5px;
border:none;
border-radius:20px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

.add-btn{background:#00ffcc;}
.delete-btn{background:#ffaa00;}
.refresh-btn{background:#ff4d4d;color:white;}

button:hover{
transform:scale(1.1);
}

/* Popup */
.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}

.popup-box{
background:white;
padding:20px;
border-radius:15px;
width:320px;
text-align:center;
color:black;
}

.popup-box input{
width:90%;
padding:8px;
margin:10px 0;
}

.suggestions{
text-align:left;
max-height:100px;
overflow-y:auto;
}

.suggestions div{
padding:5px;
cursor:pointer;
}

.suggestions div:hover{
background:#ddd;
}

.emoji{
position:absolute;
right:10px;
font-size:20px;
animation:floatUp 1s forwards;
}

@keyframes floatUp{
0%{opacity:1;transform:translateY(0);}
100%{opacity:0;transform:translateY(-40px);}
}

</style>
</head>

<body>

<div class="container">

<h1>📊 Trader Checklist</h1>

<div class="motivation">
Trade with logic. Execute with discipline. Grow with patience
</div>

<ul id="checklist"></ul>

<div class="buttons">
<button class="add-btn" id="addBtn">Add</button>
<button class="delete-btn" id="deleteBtn">Delete</button>
<button class="refresh-btn" id="refreshBtn">Refresh</button>
</div>

</div>

<!-- ADD POPUP -->
<div class="popup" id="addPopup">
<div class="popup-box">
<h3>Add New Checkbox</h3>
<input type="text" id="newItem" placeholder="Enter checkbox name">
<br>
<button id="saveBtn">Save</button>
<button onclick="closeAdd()">Cancel</button>
</div>
</div>

<!-- DELETE POPUP -->
<div class="popup" id="deletePopup">
<div class="popup-box">
<h3>Delete Checkbox</h3>
<input type="text" id="deleteInput" placeholder="Type to search">
<div class="suggestions" id="suggestions"></div>
<button id="removeBtn">Remove</button>
<button onclick="closeDelete()">Cancel</button>
</div>
</div>

<script>

const checklist=document.getElementById("checklist");

/* DEFAULT DATA */
let tasks=JSON.parse(localStorage.getItem("tasks")) || [
"Identify trend direction + structure",
"Identify where liquidity sits",
"Wait for active session (London Open)",
"Let price sweep available liquidity",
"Watch for reaction",
"Execute with defined risk"
];

/* LOAD TASKS */
function loadTasks(){

checklist.innerHTML="";

tasks.forEach(task=>{

const li=document.createElement("li");

const checkbox=document.createElement("input");
checkbox.type="checkbox";

li.appendChild(checkbox);
li.appendChild(document.createTextNode(task));

checklist.appendChild(li);

});

}

loadTasks();

/* SAVE DATA */
function saveTasks(){
localStorage.setItem("tasks",JSON.stringify(tasks));
}

/* ADD */
document.getElementById("addBtn").onclick=()=>{
document.getElementById("addPopup").style.display="flex";
};

document.getElementById("saveBtn").onclick=()=>{

const text=document.getElementById("newItem").value.trim();

if(text==="") return;

tasks.push(text);

saveTasks();

loadTasks();

closeAdd();

};

function closeAdd(){
document.getElementById("addPopup").style.display="none";
document.getElementById("newItem").value="";
}

/* DELETE */
document.getElementById("deleteBtn").onclick=()=>{
document.getElementById("deletePopup").style.display="flex";
};

const deleteInput=document.getElementById("deleteInput");
const suggestions=document.getElementById("suggestions");

deleteInput.addEventListener("input",function(){

const value=this.value.toLowerCase();

suggestions.innerHTML="";

if(value==="") return;

tasks.forEach(task=>{

if(task.toLowerCase().includes(value)){

const div=document.createElement("div");

div.textContent=task;

div.onclick=()=>{
deleteInput.value=task;
suggestions.innerHTML="";
};

suggestions.appendChild(div);

}

});

});

document.getElementById("removeBtn").onclick=()=>{

const value=deleteInput.value.trim();

tasks=tasks.filter(task=>task!==value);

saveTasks();

loadTasks();

closeDelete();

};

function closeDelete(){

document.getElementById("deletePopup").style.display="none";

deleteInput.value="";

suggestions.innerHTML="";

}

/* REFRESH (UNCHECK ALL) */
document.getElementById("refreshBtn").onclick=()=>{

document.querySelectorAll("input[type='checkbox']").forEach(cb=>{

cb.checked=false;

cb.parentElement.classList.remove("checked");

});

};

/* CHECKBOX EMOJI */
document.addEventListener("change",function(e){

if(e.target.type==="checkbox"){

if(e.target.checked){

e.target.parentElement.classList.add("checked");

const emoji=document.createElement("div");

emoji.className="emoji";

emoji.innerHTML="😊";

e.target.parentElement.appendChild(emoji);

setTimeout(()=>emoji.remove(),1000);

}else{

e.target.parentElement.classList.remove("checked");

}

}

});

</script>

</body>
</html>
